name: Release & Publish

# Two ways to trigger:
# 1. Manual from GitHub UI (recommended)
# 2. Push a v* tag
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview without releasing)'
        required: false
        default: 'false'
        type: boolean
      force_bump:
        description: 'Force bump type (leave empty for auto-detect)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      pre_release:
        description: 'Pre-release tag (e.g. alpha, beta, rc — leave empty for stable)'
        required: false
        default: ''
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9.15.0

jobs:
  # ==========================================
  # Stage 1: Validate (full test suite)
  # ==========================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # bumpcraft needs full git history

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit Tests
        run: pnpm test:unit
        env:
          NODE_ENV: test
      - name: Integration Tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgres://argus:argus@localhost:5432/argus
          REDIS_URL: redis://localhost:6379

      # Preview what bumpcraft would do
      - name: Release Preview
        run: npx bumpcraft validate

  # ==========================================
  # Stage 2: Release (bumpcraft handles everything)
  # ==========================================
  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Dry run
      - name: Release (dry run)
        if: inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN ==="
          ARGS="--dry-run"
          if [ -n "${{ inputs.force_bump }}" ]; then ARGS="$ARGS --force-bump ${{ inputs.force_bump }}"; fi
          if [ -n "${{ inputs.pre_release }}" ]; then ARGS="$ARGS --pre-release ${{ inputs.pre_release }}"; fi
          npx bumpcraft release $ARGS

      # Actual release
      - name: Release
        id: release
        if: inputs.dry_run != 'true'
        run: |
          ARGS="--approve --push"
          if [ -n "${{ inputs.force_bump }}" ]; then ARGS="$ARGS --force-bump ${{ inputs.force_bump }}"; fi
          if [ -n "${{ inputs.pre_release }}" ]; then ARGS="$ARGS --pre-release ${{ inputs.pre_release }}"; fi

          npx bumpcraft release $ARGS && RELEASED=true || RELEASED=false

          if [ "$RELEASED" = "true" ]; then
            VERSION=$(npx bumpcraft version)
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Released version: $VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No release needed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ==========================================
  # Stage 3: Publish to npm
  # ==========================================
  publish:
    name: Publish to npm
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # get the release commit
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish all packages
        run: npx bumpcraft publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ==========================================
  # Stage 4: Docker image
  # ==========================================
  docker:
    name: Docker Image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
